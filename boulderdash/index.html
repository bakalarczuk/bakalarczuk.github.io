* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:#000;
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden; touch-action:none; user-select:none;
  font-family:'Press Start 2P', monospace;
}
#hud {
  width:100%; max-width:420px; background:#111118;
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 8px; border-bottom:2px solid #f5a623; flex-shrink:0;
}
.hs { display:flex; flex-direction:column; align-items:center; gap:2px; }
.hl { font-size:5px; color:#888; letter-spacing:1px; }
.hv { font-size:10px; color:#f5a623; letter-spacing:1px; }
.hv.cyan { color:#00ffff; }
.hv.red  { color:#ff4444; }
#canvas-wrap {
  width:100%; max-width:420px; flex:1; overflow:hidden;
  display:flex; align-items:center; justify-content:center; min-height:0;
}
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#dpad {
  width:100%; max-width:420px; background:#0a0a0a;
  display:grid; grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr; gap:5px; padding:7px;
  padding-bottom:env(safe-area-inset-bottom, 7px);
  flex-shrink:0;
}
.db {
  background:#1a1a28; border:2px solid #2a2a3a; border-radius:8px;
  color:#f5a623; font-size:22px; min-height:52px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.db.on { background:#f5a623; color:#000; border-color:#f5a623; }
/* overlay screens */
.ov {
  position:absolute; inset:0; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; z-index:20;
  padding:24px;
}
.ov.show { display:flex; }
.ov::before {
  content:''; position:absolute; inset:10px;
  border:3px solid #f5a623;
  box-shadow:inset 0 0 0 3px #000, inset 0 0 0 6px #333;
  pointer-events:none;
}
.ov > * { position:relative; z-index:1; }
.ov h1 { font-size:15px; color:#f5a623; letter-spacing:3px; text-align:center; line-height:2.2; text-shadow:3px 3px 0 #7a3a00; }
.ov p  { font-size:7px; color:#888; text-align:center; line-height:2.6; letter-spacing:1px; }
.ov .cyan { font-size:9px; color:#00ffff; letter-spacing:2px; }
.ov .sc2  { font-size:8px; color:#f5a623; letter-spacing:1px; }
.btn8 {
  background:#f5a623; color:#000; border:none; cursor:pointer; letter-spacing:2px;
  font-family:'Press Start 2P',monospace; font-size:9px; padding:10px 18px;
  border-top:3px solid #ffcc66; border-left:3px solid #ffcc66;
  border-bottom:3px solid #7a3a00; border-right:3px solid #7a3a00;
}
.btn8:active { border-top:3px solid #7a3a00; border-left:3px solid #7a3a00; border-bottom:3px solid #ffcc66; border-right:3px solid #ffcc66; transform:translate(1px,1px); }

<script>
// ── Canvas & viewport ─────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let T = 16; // tile px
let VW, VH, PX;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const cw = wrap.clientWidth;
  const ch = wrap.clientHeight;
  if (cw < 1 || ch < 1) return;
  PX = Math.max(2, Math.min(4, Math.floor(cw / (T * 11))));
  VW = Math.floor(cw / (T * PX));
  VH = Math.floor(ch / (T * PX));
  if (VW % 2 === 0) VW--;
  if (VH % 2 === 0) VH--;
  canvas.width  = VW * T;
  canvas.height = VH * T;
  canvas.style.width  = (VW * T * PX) + 'px';
  canvas.style.height = (VH * T * PX) + 'px';
  // Regenerate level to fit new viewport if game running
  if (typeof ROWS !== 'undefined' && running) initLevel();
}

// ── Tile constants ────────────────────────────────────
const EMPTY =0, DIRT=1, WALL=2, STEEL=3, BOULDER=4, DIAMOND=5, EXIT=7, BUTTERFLY=11, AMOEBA=12, MAGIC=13;

// ── Pixel sprites — fillRect only ─────────────────────
// Each entry: [x,y,w,h, colorIndex]
// PAL: 0=black 1=dirt-brown 2=dirt-hi 3=wall-dk 4=wall-gr 5=wall-sh
//      6=steel-dk 7=steel-md 8=steel-lt 9=steel-sh 10=bould-dk 11=bould-md
//      12=bould-lt 13=white 14=cyan 15=cyan-dk 16=player-y 17=player-o
//      18=exit-gr 19=exit-dk 20=expl-o 21=expl-y 22=expl-r 25=dgrey
const PAL = [
  '#000000','#5c3317','#7a4a1e','#3b5e1f','#4e7a28','#2a4a18',
  '#1a1a2e','#2a2a4e','#4444aa','#aaaacc','#8b3a0a','#c46820',
  '#e8943a','#ffffff','#00ccff','#0088cc','#ffd700','#ffaa00',
  '#00ff44','#00cc33','#ff8800','#ffff00','#ff0000','#222222','#ff6600','#333333'
];

// ── Worlds — color themes every 5 levels ────────────
const WORLDS = [
  { name:'CAVE',  minLvl:0,  pal:{1:'#5c3317',2:'#7a4a1e',3:'#3b5e1f',4:'#4e7a28',10:'#8b3a0a',11:'#c46820',12:'#e8943a'} },
  { name:'LAVA',  minLvl:5,  pal:{1:'#3a1010',2:'#5a1818',3:'#6a1a0a',4:'#8a2a10',10:'#8b2200',11:'#c43800',12:'#e86020'} },
  { name:'ICE',   minLvl:10, pal:{1:'#1a2a4a',2:'#2a3a6a',3:'#1a3a5a',4:'#2a5a7a',10:'#4a6a9a',11:'#7aaacc',12:'#aaddff'} },
  { name:'DARK',  minLvl:15, pal:{1:'#111111',2:'#1a1a1a',3:'#0a0a0a',4:'#161616',10:'#2a1a0a',11:'#3a2a10',12:'#4a3a18'} },
];

function getWorld(lvl) {
  for (let i = WORLDS.length-1; i >= 0; i--)
    if (lvl >= WORLDS[i].minLvl) return WORLDS[i];
  return WORLDS[0];
}

let currentPAL = PAL.slice(); // working copy

function applyWorld(lvl) {
  currentPAL = PAL.slice();
  const w = getWorld(lvl);
  for (const [idx, col] of Object.entries(w.pal))
    currentPAL[parseInt(idx)] = col;
}

const DIRT_S = [[0,0,16,16,1],[2,2,3,3,2],[9,1,2,2,2],[13,5,2,2,2],[1,10,2,2,2],[7,13,3,3,2],[11,11,2,2,2],[4,7,2,2,0],[10,8,2,2,0]];
const WALL_S = [[0,0,16,16,3],[1,1,14,14,4],[0,0,16,1,5],[0,15,16,1,5],[0,0,1,16,5],[15,0,1,16,5],[4,4,8,8,3],[5,5,6,6,4]];
const STEEL_S = [[0,0,16,16,6],[1,1,14,14,7],[2,2,12,12,8],[1,1,14,2,9],[1,1,2,14,9],[5,5,6,6,6],[6,6,4,4,9]];
const BOULD_S = [[3,0,10,1,10],[1,1,14,2,10],[0,3,16,6,10],[1,9,14,2,10],[3,11,10,1,10],[2,1,10,1,11],[1,2,12,7,11],[1,2,8,5,12],[2,2,3,2,13],[10,8,5,3,25]];

function drawSpr(rects, ox, oy) {
  for (let i = 0; i < rects.length; i++) {
    let r = rects[i];
    ctx.fillStyle = currentPAL[r[4]];
    ctx.fillRect(ox+r[0], oy+r[1], r[2], r[3]);
  }
}

function drawDiamond(ox, oy, frame, gr, gc) {
  let t = (frame*3 + gr*7 + gc*11) % 16;
  let cols = [14,16,14,15,14,16,13,16,14,15,14,16,14,15,16,14];
  let c = PAL[cols[t]];
  let d = PAL[15];
  ctx.fillStyle = c;
  ctx.fillRect(ox+7,oy+0,2,2); ctx.fillRect(ox+5,oy+2,6,2); ctx.fillRect(ox+3,oy+4,10,2);
  ctx.fillRect(ox+1,oy+6,14,2); ctx.fillRect(ox+1,oy+8,14,2); ctx.fillRect(ox+3,oy+10,10,2);
  ctx.fillRect(ox+5,oy+12,6,2); ctx.fillRect(ox+7,oy+14,2,2);
  ctx.fillStyle = PAL[13]; ctx.fillRect(ox+6,oy+3,4,1); ctx.fillRect(ox+5,oy+4,2,1);
  ctx.fillStyle = d; ctx.fillRect(ox+3,oy+6,1,4); ctx.fillRect(ox+12,oy+6,1,4);
}

function drawPlayer(ox, oy, frame) {
  const blink = frame % 60 < 55;
  const moving = (performance.now() - lastMoveTime) < 250;
  const walk = moving ? Math.floor(walkFrame/2) % 2 : 0;
  ctx.fillStyle = PAL[13];
  ctx.fillRect(ox+3,oy+0,10,1); ctx.fillRect(ox+2,oy+1,12,1); ctx.fillRect(ox+1,oy+2,14,1);
  ctx.fillRect(ox+1,oy+3,14,6); ctx.fillRect(ox+0,oy+5,2,3); ctx.fillRect(ox+14,oy+5,2,3);
  ctx.fillRect(ox+3,oy+9,4,7); ctx.fillRect(ox+9,oy+9,4,7);
  ctx.fillStyle = PAL[17];
  ctx.fillRect(ox+(walk?2:3),oy+14,5,2); ctx.fillRect(ox+(walk?9:8),oy+14,4,2);
  ctx.fillRect(ox+2,oy+0,12,2); ctx.fillRect(ox+0,oy+2,2,2); ctx.fillRect(ox+14,oy+2,2,2);
  ctx.fillStyle = PAL[21]; ctx.fillRect(ox+7,oy+0,2,2);
  if (blink) {
    ctx.fillStyle = PAL[0]; ctx.fillRect(ox+4,oy+3,2,2); ctx.fillRect(ox+10,oy+3,2,2);
    ctx.fillStyle = PAL[25]; ctx.fillRect(ox+4,oy+3,1,1); ctx.fillRect(ox+10,oy+3,1,1);
  } else {
    ctx.fillStyle = PAL[0]; ctx.fillRect(ox+4,oy+3,2,1); ctx.fillRect(ox+10,oy+3,2,1);
  }
}

function drawExit(ox, oy, open, frame) {
  if (!open) { drawSpr(STEEL_S,ox,oy); ctx.fillStyle='#222'; ctx.fillRect(ox+4,oy+4,8,8); return; }
  let fl = Math.floor(frame/6)%2;
  ctx.fillStyle = fl ? PAL[18] : PAL[19]; ctx.fillRect(ox,oy,16,16);
  ctx.fillStyle = fl ? PAL[21] : PAL[18]; ctx.fillRect(ox+2,oy+2,12,12);
  ctx.fillStyle = fl ? PAL[13] : PAL[21]; ctx.fillRect(ox+5,oy+5,6,6);
}

function drawExplosion(ox, oy, t) {
  let cols = [22,24,20,21,13];
  let ci = Math.min(4, Math.floor((10-t)/2));
  ctx.fillStyle = PAL[cols[ci]];
  ctx.fillRect(ox,oy,16,16);
  ctx.fillStyle = PAL[cols[Math.min(4,ci+1)]];
  let m = t*1.2|0;
  ctx.fillRect(ox+m,oy+m,16-m*2,16-m*2);
}

// ── Draw butterfly ──────────────────────────────────
function drawButterfly(ox, oy, frame) {
  // Alternates between two wing positions every 8 frames
  const wing = Math.floor(frame / 8) % 2;
  // Body — dark orange center
  ctx.fillStyle = '#c86020';
  ctx.fillRect(ox+6, oy+6, 4, 4);
  ctx.fillStyle = '#f89040';
  ctx.fillRect(ox+7, oy+7, 2, 2);
  if (wing === 0) {
    // Wings spread
    ctx.fillStyle = '#f84800';
    ctx.fillRect(ox+1, oy+2, 5, 5);   // top-left wing
    ctx.fillRect(ox+10, oy+2, 5, 5);  // top-right wing
    ctx.fillRect(ox+2, oy+8, 4, 4);   // bottom-left wing
    ctx.fillRect(ox+10, oy+8, 4, 4);  // bottom-right wing
    ctx.fillStyle = '#fc8800';
    ctx.fillRect(ox+2, oy+3, 3, 3);
    ctx.fillRect(ox+11, oy+3, 3, 3);
    ctx.fillRect(ox+3, oy+9, 2, 2);
    ctx.fillRect(ox+11, oy+9, 2, 2);
  } else {
    // Wings folded (smaller)
    ctx.fillStyle = '#f84800';
    ctx.fillRect(ox+3, oy+4, 4, 4);   // top-left wing
    ctx.fillRect(ox+9, oy+4, 4, 4);   // top-right wing
    ctx.fillRect(ox+3, oy+9, 3, 3);   // bottom-left wing
    ctx.fillRect(ox+10, oy+9, 3, 3);  // bottom-right wing
    ctx.fillStyle = '#fc8800';
    ctx.fillRect(ox+4, oy+5, 2, 2);
    ctx.fillRect(ox+10, oy+5, 2, 2);
    ctx.fillRect(ox+4, oy+10, 2, 2);
    ctx.fillRect(ox+10, oy+10, 2, 2);
  }
  // Antennae
  ctx.fillStyle = '#fc8800';
  ctx.fillRect(ox+6, oy+4, 1, 2);
  ctx.fillRect(ox+9, oy+4, 1, 2);
  ctx.fillRect(ox+5, oy+3, 2, 1);
  ctx.fillRect(ox+9, oy+3, 2, 1);
}

// ── Draw amoeba ──────────────────────────────────────
function drawAmoeba(ox, oy, frame) {
  const pulse = Math.floor(frame / 6) % 2;
  ctx.fillStyle = pulse ? '#9932cc' : '#7a20aa';
  ctx.fillRect(ox, oy, T, T);
  ctx.fillStyle = pulse ? '#cc66ff' : '#aa44dd';
  ctx.fillRect(ox+2, oy+2, 5, 5);
  ctx.fillRect(ox+9, oy+5, 5, 4);
  ctx.fillRect(ox+4, oy+10, 6, 4);
  ctx.fillStyle = '#ff99ff';
  ctx.fillRect(ox+3, oy+3, 2, 2);
}

// ── Draw magic wall ───────────────────────────────
function drawMagicWall(ox, oy, frame, active) {
  drawSpr(STEEL_S, ox, oy);
  const fl = Math.floor(frame / 4) % 2;
  if (active) {
    ctx.fillStyle = fl ? '#ffff00' : '#ff8800';
    ctx.fillRect(ox+3, oy+3, 10, 10);
    ctx.fillStyle = fl ? '#ffffff' : '#ffcc00';
    ctx.fillRect(ox+5, oy+5, 6, 6);
  } else {
    ctx.fillStyle = '#444466';
    ctx.fillRect(ox+4, oy+4, 8, 8);
    ctx.fillStyle = '#222244';
    ctx.fillRect(ox+5, oy+5, 6, 6);
  }
}

// ── Procedural level generator ───────────────────────
// Difficulty ramps with level number (0-based)
// Returns { rows, cols, gemsNeeded, gemsTotal, time, pts }

const rng = (seed) => {
  // Simple seeded LCG so each level is reproducible but unique
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function generateLevel(lvl) {
  let diff = lvl;                              // 0 = easy
  // Map size = at least VW/VH (fills screen), grows with difficulty
  let rows = Math.max(VH || 14, Math.min(28, 14 + Math.floor(diff/3)*2));
  let cols = Math.max(VW || 22, Math.min(40, 22 + Math.floor(diff/3)*2));
  // Ensure odd dimensions for centering
  if (rows % 2 === 0) rows++;
  if (cols % 2 === 0) cols++;
  // Difficulty params
  let boulderChance = 0.06 + diff*0.012;       // more boulders
  let wallChance = 0.05 + diff*0.005;       // more walls
  let diamondChance = Math.max(0.04, 0.09 - diff*0.006); // fewer diamonds
  let gemsNeeded = 5 + Math.floor(diff*1.5);
  let time = Math.max(60, 160 - diff*8);
  let pts = 20 + diff*10;
  let rand = rng(lvl * 7919 + 12345);

  let g = [];
  let i, r, c;
  for (r=0; r<rows; r++) {
    g[r]=[];
    for (c=0; c<cols; c++) {
      // Border = steel
      if (r===0||r===rows-1||c===0||c===cols-1) { g[r][c]=STEEL; continue; }
      const roll = rand();
      if      (roll < boulderChance) g[r][c]=BOULDER;
      else if (roll < boulderChance+diamondChance) g[r][c]=DIAMOND;
      else if (roll < boulderChance+diamondChance+wallChance) g[r][c]=WALL;
      else g[r][c]=DIRT;
    }
  }

  // Place player bottom-left area, clear 3x3 around them
  let px =2, py=rows-2;
  g[py][px]=EMPTY;
  for (r=py-1; r<=py; r++) for (c=px; c<=px+2; c++) if(r>0&&c<cols-1) g[r][c]=EMPTY;

  // Place exit top-right area, clear path around it
  let ex =cols-3, ey=2;
  g[ey][ex]=EXIT;
  for (r=ey-1; r<=ey+1; r++) for (c=ex-1; c<=ex+1; c++) if(r>0&&r<rows-1&&c>0&&c<cols-1) { if(g[r][c]!==EXIT) g[r][c]=EMPTY; }

  // Spawn butterflies — 1 on level 0, more as difficulty rises
  const numButterflies = diff < 3 ? 0 : Math.floor((diff - 2) / 3);
  let bAttempts = 0;
  let bPlaced = 0;
  while (bPlaced < numButterflies && bAttempts < 300) {
    bAttempts++;
    const br = 2 + Math.floor(rand() * (rows - 4));
    const bc = 2 + Math.floor(rand() * (cols - 4));
    // Place on dirt, away from player start and exit
    if (g[br][bc] === DIRT &&
        Math.abs(br - py) + Math.abs(bc - px) > 5 &&
        Math.abs(br - ey) + Math.abs(bc - ex) > 5) {
      g[br][bc] = BUTTERFLY;
      bPlaced++;
    }
  }

  // Spawn amoeba (from level 5)
  if (diff >= 5) {
    const numAmoeba = 1 + Math.floor((diff-5) / 4);
    let aAttempts = 0, aPlaced = 0;
    while (aPlaced < numAmoeba && aAttempts < 200) {
      aAttempts++;
      const ar = 3 + Math.floor(rand()*(rows-6));
      const ac = 3 + Math.floor(rand()*(cols-6));
      if (g[ar][ac] === DIRT &&
          Math.abs(ar-py)+Math.abs(ac-px) > 6 &&
          Math.abs(ar-ey)+Math.abs(ac-ex) > 6) {
        g[ar][ac] = AMOEBA; aPlaced++;
      }
    }
  }

  // Spawn magic wall (from level 3) — replace some wall tiles
  if (diff >= 3) {
    let mPlaced = 0;
    for (let r=1; r<rows-1 && mPlaced < 2+Math.floor(diff/4); r++) {
      for (let c=1; c<cols-1 && mPlaced < 2+Math.floor(diff/4); c++) {
        if (g[r][c] === WALL && rand() < 0.15) {
          g[r][c] = MAGIC; mPlaced++;
        }
      }
    }
  }

  // Count diamonds
  let dCount = 0;
  for (r=1; r<rows-1; r++) for (c=1; c<cols-1; c++) if(g[r][c]===DIAMOND) dCount++;
  // Extra diamonds for bonus: just 1-2 on early levels, up to 5 on harder ones
  const extraBonus = 1 + Math.min(4, Math.floor(diff/2));
  const needed = gemsNeeded + extraBonus;
  // Remove excess diamonds if too many spawned randomly
  if (dCount > needed + 2) {
    let toRemove = dCount - (needed + 2);
    for (r=1; r<rows-1 && toRemove>0; r++) {
      for (c=1; c<cols-1 && toRemove>0; c++) {
        if (g[r][c]===DIAMOND) { g[r][c]=DIRT; dCount--; toRemove--; }
      }
    }
  }
  // Add diamonds if not enough
  let attempts = 0;
  while (dCount < needed && attempts < 500) {
    attempts++;
    const dr2 = 1+Math.floor(rand()*(rows-2));
    const dc2 = 1+Math.floor(rand()*(cols-2));
    if (g[dr2][dc2]===DIRT) { g[dr2][dc2]=DIAMOND; dCount++; }
  }
  gemsNeeded = Math.min(gemsNeeded, dCount);

  return { rows:rows, cols:cols, gemsNeeded:gemsNeeded, time:time, pts:pts, grid:g, playerX:px, playerY:py };
}

// ── Game state ────────────────────────────────────────
// ── Sound ───────────────────────────────────────────────
let audioCtx = null;
function playSound(type) {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
  }
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  let now = audioCtx.currentTime;
  if (type === 'boulder') {
    o.type = 'square';
    o.frequency.setValueAtTime(180, now);
    o.frequency.linearRampToValueAtTime(90, now+0.18);
    g.gain.setValueAtTime(0.13, now);
    g.gain.linearRampToValueAtTime(0, now+0.2);
    o.start(now);
    o.stop(now+0.2);
    return;
  }
  if (type === 'diamond') {
    o.type = 'triangle';
    o.frequency.setValueAtTime(880, now);
    o.frequency.linearRampToValueAtTime(1320, now+0.15);
    g.gain.setValueAtTime(0.12, now);
    g.gain.linearRampToValueAtTime(0, now+0.18);
    o.start(now);
    o.stop(now+0.18);
  } else if (type === 'death') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(220, now);
    o.frequency.linearRampToValueAtTime(110, now+0.4);
    g.gain.setValueAtTime(0.18, now);
    g.gain.linearRampToValueAtTime(0, now+0.45);
    o.start(now);
    o.stop(now+0.45);
  } else if (type === 'level') {
    o.type = 'square';
    o.frequency.setValueAtTime(660, now);
    o.frequency.linearRampToValueAtTime(990, now+0.25);
    g.gain.setValueAtTime(0.15, now);
    g.gain.linearRampToValueAtTime(0, now+0.28);
    o.start(now);
    o.stop(now+0.28);
  }
}
let ROWS =14, COLS=22;
let grid, playerX, playerY;
let score =0, lives=3, level=0;
let gemsGot =0, gemsNeeded=0, timeLeft=150, pts=20;
let running =false, exitOpen=false;
let loopId =null, timerInt=null;
let animFrame =0, lastPhys=0;
let explosions =[];
let playerDying =false, dyingLock=false, levelDone=false;
let lastMove =0, moveDelay=160;
let walkFrame=0, lastMoveTime=0;
let holdInt =null;
let pendingScore =0;
let levelStartTime = 0;  // time when level started
let levelStartTimeLeft = 150;  // timeLeft at level start
const STARS_KEY = 'bd_stars_v1';
function starsLoad() { try { return JSON.parse(localStorage.getItem(STARS_KEY))||{}; } catch(e) { return {}; } }
function starsGet(lvl) { return starsLoad()[lvl] || 0; }
function starsSet(lvl, s) { const d=starsLoad(); d[lvl]=Math.max(d[lvl]||0,s); localStorage.setItem(STARS_KEY,JSON.stringify(d)); }
function calcStars(timeLeft, startTimeLeft, allGems) {
  const ratio = timeLeft / startTimeLeft;
  if (ratio > 0.6 && allGems) return 3;
  if (ratio > 0.3) return 2;
  return 1;
}
let scorePopups = [];
let butterflies = [];  // [{r, c, dir}] dir: 0=up,1=right,2=down,3=left
let amoebaTimer = 0;   // ticks since last amoeba growth
let amoebaSize  = 0;   // total amoeba tile count
let magicTimer  = 0;   // ticks magic wall is active
let magicActive = false;

function initLevel() {
  let gen = generateLevel(level);
  ROWS=gen.rows; COLS=gen.cols;
  gemsNeeded=gen.gemsNeeded; gemsGot=0;
  timeLeft=gen.time; pts=gen.pts;
  levelStartTimeLeft=gen.time;
  exitOpen=false; explosions=[];
  playerDying=false; levelDone=false;
  playerX=gen.playerX; playerY=gen.playerY;
  grid=[]; falling=[];
  scorePopups = [];
  butterflies = [];
  amoebaTimer = 0; amoebaSize = 0;
  magicTimer = 0; magicActive = false;
  for (let r=0; r<ROWS; r++) {
    grid[r]=gen.grid[r].slice();
    falling[r]=[];
    for (let c=0; c<COLS; c++) {
      falling[r][c]=false;
      // Collect butterfly positions into butterflies array
      if (grid[r][c] === BUTTERFLY) {
        butterflies.push({ r, c, dir: Math.floor(Math.random()*4) });
        grid[r][c] = EMPTY; // butterflies tracked separately
      }
    }
  }
  applyWorld(level);
  levelStartTimeLeft = 0;  // set after gen
  updateHUD();
}

function updateHUD() {
  document.getElementById('h-score').textContent  = score;
  document.getElementById('h-gems').textContent   = `${gemsGot}/${gemsNeeded}`;
  document.getElementById('h-time').textContent   = timeLeft;
  document.getElementById('h-lives').textContent  = lives;
  document.getElementById('h-level').textContent  = level+1;
  document.getElementById('h-time').style.color   = timeLeft<30?'#ff2222':'#ff4444';
}

// ── Physics ───────────────────────────────────────────
// falling[r][c] = true means this tile was falling last tick
let falling = [];
for (let _r=0; _r<ROWS; _r++) { falling[_r]=[]; for (let _c=0;_c<COLS;_c++) falling[_r][_c]=false; }

function physics() {
  if (!running || playerDying || dyingLock || levelDone) return;
  let nextFalling = [];
  for (let _r=0; _r<ROWS; _r++) { nextFalling[_r]=[]; for (let _c=0;_c<COLS;_c++) nextFalling[_r][_c]=false; }
  let hit = false;
  for (let r=ROWS-2; r>=0; r--) {
    for (let c=0; c<COLS; c++) {
      let t = grid[r][c];
      if (t===BOULDER || t===DIAMOND) {
        const below = grid[r+1][c];
        const belowIsPlayer = (r+1===playerY && c===playerX);
        // Player blocks boulder/diamond just like a wall
        if (below===EMPTY && !belowIsPlayer) {
          // Check if a butterfly is at r+1 BEFORE moving boulder there
          const bfHit = butterflies.findIndex(b => b.r === r+1 && b.c === c);
          if (bfHit >= 0) {
            // Boulder/diamond hits butterfly — explode regardless of falling state
            grid[r][c] = EMPTY;
            butterflyExplode(butterflies[bfHit].r, butterflies[bfHit].c);
          } else {
            // falls freely
            grid[r+1][c]=t; grid[r][c]=EMPTY;
            nextFalling[r+1][c]=true;
            if (t === BOULDER) playSound('boulder');
            // kill player only if was already falling
            if (r+2===playerY && c===playerX && falling[r][c]) hit=true;
          }
        } else if (!belowIsPlayer && r+1<ROWS &&
                   (below===BOULDER||below===WALL||below===STEEL||below===DIAMOND||below===MAGIC)) {
          // resting on solid — try to roll, but only if was falling
          if (falling[r][c]) {
            if (c+1<COLS && grid[r][c+1]===EMPTY && grid[r+1][c+1]===EMPTY) {
              grid[r][c+1]=t; grid[r][c]=EMPTY;
              nextFalling[r][c+1]=true;
            } else if (c-1>=0 && grid[r][c-1]===EMPTY && grid[r+1][c-1]===EMPTY) {
              grid[r][c-1]=t; grid[r][c]=EMPTY;
              nextFalling[r][c-1]=true;
            }
          }
          // else stable rest — not falling
        }
        // Magic wall: boulder/diamond enters magic tile → transforms below
        if (below === MAGIC && !magicActive && !magicTimer) {
          magicActive = true; magicTimer = 0;
        }
        if (below === MAGIC && magicActive) {
          const outTile = (t === BOULDER) ? DIAMOND : BOULDER;
          const nr2 = r+2;
          if (nr2 < ROWS && grid[nr2][c] === EMPTY) {
            grid[r][c] = EMPTY;
            grid[nr2][c] = outTile;
            nextFalling[nr2][c] = true;
          } else {
            grid[r][c] = EMPTY; // boulder disappears
          }
        }
        // if belowIsPlayer — do nothing, player supports it
      }
    }
  }
  falling = nextFalling;
  if (hit && !playerDying && !dyingLock) playerDie();

  // ── Butterfly movement (every other physics tick) ──
  if (animFrame % 2 === 0) moveButterflies();

  // ── Amoeba growth ──
  amoebaTimer++;
  if (amoebaTimer % 8 === 0) tickAmoeba();

  // ── Magic wall timer ──
  if (magicActive) {
    magicTimer++;
    if (magicTimer > 120) { magicActive = false; }
  }
}

function tickAmoeba() {
  const cells = [];
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (grid[r][c] === AMOEBA) cells.push({r,c});

  amoebaSize = cells.length;

  // Too large → all become boulders
  if (amoebaSize > 60) {
    for (const a of cells) grid[a.r][a.c] = BOULDER;
    return;
  }

  // Check if enclosed (can't expand) → all become diamonds
  let canExpand = false;
  for (const a of cells) {
    for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr=a.r+dr, nc=a.c+dc;
      if (nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1 && (grid[nr][nc]===EMPTY||grid[nr][nc]===DIRT)) {
        canExpand = true; break;
      }
    }
    if (canExpand) break;
  }
  if (!canExpand) {
    for (const a of cells) grid[a.r][a.c] = DIAMOND;
    return;
  }

  // Grow randomly into one adjacent dirt/empty
  if (cells.length > 0) {
    const src = cells[Math.floor(Math.random()*cells.length)];
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]].sort(()=>Math.random()-0.5);
    for (const [dr,dc] of dirs) {
      const nr=src.r+dr, nc=src.c+dc;
      if (nr>0&&nr<ROWS-1&&nc>0&&nc<COLS-1 && (grid[nr][nc]===EMPTY||grid[nr][nc]===DIRT)) {
        grid[nr][nc] = AMOEBA; break;
      }
    }
  }

  // Kill player if amoeba touches them
  for (const a of cells) {
    if (Math.abs(a.r-playerY)<=1 && Math.abs(a.c-playerX)<=1 &&
        a.r===playerY && a.c===playerX) {
      if (!playerDying && !dyingLock) playerDie();
      return;
    }
  }
}

function moveButterflies() {
  // dir: 0=up, 1=right, 2=down, 3=left
  const DR = [-1, 0, 1,  0];
  const DC = [ 0, 1, 0, -1];

  // Check if a cell is passable for butterfly (empty or dirt)
  const passable = (r, c) => {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
    const t = grid[r][c];
    return t === EMPTY || t === DIRT;
  };

  for (let i = butterflies.length - 1; i >= 0; i--) {
    const b = butterflies[i];

    // Left-hand rule: try turn-left, forward, turn-right, reverse
    const leftDir  = (b.dir + 3) % 4;
    const rightDir = (b.dir + 1) % 4;
    const backDir  = (b.dir + 2) % 4;

    let moved = false;
    for (const tryDir of [leftDir, b.dir, rightDir, backDir]) {
      const nr = b.r + DR[tryDir];
      const nc = b.c + DC[tryDir];
      if (passable(nr, nc)) {
        b.r = nr; b.c = nc; b.dir = tryDir;
        moved = true;
        break;
      }
    }

    // Kill player on contact
    if (!playerDying && !dyingLock) {
      const dr = Math.abs(b.r - playerY);
      const dc = Math.abs(b.c - playerX);
      if (dr <= 1 && dc <= 1 && dr + dc <= 1) {
        playerDie();
        return;
      }
    }
  }
}

function butterflyExplode(r, c) {
  // Remove butterfly at r,c
  butterflies = butterflies.filter(b => !(b.r === r && b.c === c));
  score += 500;  // bonus for killing butterfly
  updateHUD();
  // 3×3 explosion: dirt → diamond, others → empty (except steel)
  for (let er = r-1; er <= r+1; er++) {
    for (let ec = c-1; ec <= c+1; ec++) {
      if (er < 0 || er >= ROWS || ec < 0 || ec >= COLS) continue;
      if (grid[er][ec] === STEEL) continue;
      grid[er][ec] = DIAMOND;
      explosions.push({r: er, c: ec, t: 10});
    }
  }
  // Check if player is in explosion zone
  if (!playerDying && !dyingLock) {
    if (Math.abs(playerY - r) <= 1 && Math.abs(playerX - c) <= 1) {
      playerDie();
    }
  }
}

// ── Movement ──────────────────────────────────────────
function move(dr, dc) {
  if (!running || playerDying || dyingLock || levelDone) return;
  let now = Date.now();
  if (now - lastMove < moveDelay) return;
  lastMove = now;
  let nr =playerY+dr, nc=playerX+dc;
  if (nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
  let tgt = grid[nr][nc];
  if (tgt===STEEL||tgt===WALL) return;
  if (tgt===BOULDER) {
    // Sprawdź, czy za kamieniem jest puste pole
    let nnr = nr + dr, nnc = nc + dc;
    if (nnr >= 0 && nnr < ROWS && nnc >= 0 && nnc < COLS && grid[nnr][nnc] === EMPTY) {
      // Przesuń kamień
      grid[nnr][nnc] = BOULDER;
      grid[nr][nc] = EMPTY;
    } else {
      return;
    }
  }
  if (tgt===EXIT) {
    if (!exitOpen) return;
    // Player steps into exit — move them there, then trigger transition
    levelDone=true;
    try { navigator.vibrate(150); } catch(e) {}
    // Count total diamonds on map for 3-star check
    let totalGems = 0;
    for (let _r=0;_r<ROWS;_r++) for (let _c=0;_c<COLS;_c++) if(grid[_r][_c]===DIAMOND) totalGems++;
    const allGems = (gemsGot >= gemsNeeded + totalGems);
    const stars = calcStars(timeLeft, levelStartTimeLeft || timeLeft+1, allGems);
    starsSet(level, stars);
    score+=timeLeft*5;
    grid[playerY][playerX]=EMPTY;
    playerY=nr; playerX=nc;
    updateHUD();
    setTimeout(() => { showLoadingScreen(stars); }, 400);
    return;
  }
  if (tgt===DIAMOND) {
    gemsGot++;
    try { navigator.vibrate(30); } catch(e) {}
    playSound('diamond');
    // Bonus multiplier for gems collected beyond minimum
    let bonus = gemsGot > gemsNeeded ? 3 : 1;
    score += pts * bonus;
    scorePopups.push({x: playerX*T, y: playerY*T, val: pts*bonus, t: 80, bonus: bonus>1});
    if (bonus > 1) {
      // Flash score element to signal bonus
      let el = document.getElementById('h-score');
      el.style.color='#ff0';
      setTimeout(() => { el.style.color='#f5a623'; }, 300);
    }
    if (gemsGot>=gemsNeeded) exitOpen=true;
    updateHUD();
  }
  grid[playerY][playerX]=EMPTY;
  playerY=nr; playerX=nc;
  if (grid[playerY][playerX]!==EXIT) grid[playerY][playerX]=EMPTY;
  lastMoveTime=performance.now();
  walkFrame++;
}

// ── Player death ──────────────────────────────────────
function playerDie() {
  if (dyingLock || playerDying || !running) return;
  dyingLock=true; playerDying=true;
  try { navigator.vibrate([100,50,100]); } catch(e) {}
  playSound('death');
  lives--; updateHUD();
  for (let dr=-1; dr<=1; dr++) {
    for (let dc=-1; dc<=1; dc++) {
      let er =playerY+dr, ec=playerX+dc;
      if (er>=0&&er<ROWS&&ec>=0&&ec<COLS&&grid[er][ec]!==STEEL) {
        explosions.push({r:er,c:ec,t:10});
        grid[er][ec]=EMPTY;
      }
    }
  }
  if (lives<=0) {
    running=false; clearInterval(timerInt);
    setTimeout(() => {
      dyingLock=false; playerDying=false;
      pendingScore=score; showGameOver(score);
    }, 1400);
  } else {
    setTimeout(() => {
      dyingLock=false; playerDying=false; initLevel();
    }, 1000);
  }
}

// ── Render ────────────────────────────────────────────
function render() {
  let camC = playerX - Math.floor(VW/2);
  let camR = playerY - Math.floor(VH/2);
  camC = Math.max(0, Math.min(camC, COLS-VW));
  camR = Math.max(0, Math.min(camR, ROWS-VH));
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for (let vr=0; vr<VH; vr++) {
    for (let vc=0; vc<VW; vc++) {
      let gr =camR+vr, gc=camC+vc;
      let ox =vc*T, oy=vr*T;
      if (gr<0||gr>=ROWS||gc<0||gc>=COLS) { ctx.fillStyle='#000'; ctx.fillRect(ox,oy,T,T); continue; }
      let tile =grid[gr][gc];
      if      (tile===EMPTY)   { ctx.fillStyle='#050508'; ctx.fillRect(ox,oy,T,T); }
      else if (tile===DIRT)    drawSpr(DIRT_S,ox,oy);
      else if (tile===WALL)    drawSpr(WALL_S,ox,oy);
      else if (tile===STEEL)   drawSpr(STEEL_S,ox,oy);
      else if (tile===BOULDER) drawSpr(BOULD_S,ox,oy);
      else if (tile===DIAMOND) drawDiamond(ox,oy,animFrame,gr,gc);
      else if (tile===EXIT)    drawExit(ox,oy,exitOpen,animFrame);
      else if (tile===AMOEBA)  drawAmoeba(ox,oy,animFrame);
      else if (tile===MAGIC)   drawMagicWall(ox,oy,animFrame,magicActive);
      else { ctx.fillStyle='#050508'; ctx.fillRect(ox,oy,T,T); }
    }
  }
  for (let i=explosions.length-1; i>=0; i--) {
    let ex =explosions[i];
    const vc2 =ex.c-camC, vr2=ex.r-camR;
    if (vc2>=0&&vc2<VW&&vr2>=0&&vr2<VH) drawExplosion(vc2*T,vr2*T,ex.t);
    ex.t--;
    if (ex.t<=0) explosions.splice(i,1);
  }
  // Draw butterflies
  for (let i = 0; i < butterflies.length; i++) {
    const b = butterflies[i];
    const bvc = b.c - camC, bvr = b.r - camR;
    if (bvc >= 0 && bvc < VW && bvr >= 0 && bvr < VH) {
      drawButterfly(bvc*T, bvr*T, animFrame);
    }
  }

  let pvc =playerX-camC, pvr=playerY-camR;
  if (pvc>=0&&pvc<VW&&pvr>=0&&pvr<VH) {
    if (!playerDying||animFrame%8<4) drawPlayer(pvc*T,pvr*T,animFrame);
  }
  // Score popups
  ctx.save();
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    let s = scorePopups[i];
    let color = s.bonus ? '#00ffff' : '#ffd700';
    ctx.fillStyle = color;
    ctx.globalAlpha = Math.max(0, s.t / 80);
    // Move slower: vertical offset increases slower
    ctx.fillText('+' + s.val, s.x - camC*T + T/2, s.y - camR*T - ((80 - s.t) * 0.5) + T/2);
    s.t--;
    if (s.t <= 0) scorePopups.splice(i, 1);
  }
  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────
function gameLoop(ts) {
  if (!running) return;
  animFrame++;
  if (ts-lastPhys>220) { physics(); lastPhys=ts; }
  render();
  loopId=requestAnimationFrame(gameLoop);
}

function showLoadingScreen(earnedStars) {
  // Stop game loop, show loading screen with animated bar
  running = false;
  clearInterval(timerInt);
  const nextLevel = level + 1;
  const gen = generateLevel(nextLevel);

  const ov = document.getElementById('ov-loading');
  ov.style.display = 'flex';
  const nextWorld = getWorld(nextLevel);
  const curWorld  = getWorld(level);
  const worldChanged = nextWorld.name !== curWorld.name;
  document.getElementById('loading-level').textContent = `POZIOM ${nextLevel + 1}`;
  document.getElementById('loading-title').textContent =
    worldChanged ? `✦ ${nextWorld.name} ✦` : 'POZIOM UKOŃCZONY!';
  document.getElementById('loading-stars').textContent =
    earnedStars ? '★'.repeat(earnedStars) + '☆'.repeat(3-earnedStars) : '';
  document.getElementById('loading-info').innerHTML =
    `DIAMENTY: ${gen.gemsNeeded} &nbsp; CZAS: ${gen.time}s`;

  // Animate bar 0→100% over 1.8s then load next level
  const bar = document.getElementById('loading-bar');
  bar.style.width = '0%';
  const startTime = performance.now();
  const duration = 1800;

  function animBar(ts) {
    const pct = Math.min(100, ((ts - startTime) / duration) * 100);
    bar.style.width = pct + '%';
    // Flash color near end
    bar.style.background = pct > 80 ? '#00ff44' : '#f5a623';
    if (pct < 100) {
      requestAnimationFrame(animBar);
    } else {
      // Done — load next level
      ov.style.display = 'none';
      playSound('level');
      level++;
      levelDone = false;
      dyingLock = false;
      initLevel();
      running = true;
      lastPhys = 0;
      timerInt = setInterval(() => {
        if (!running || playerDying || dyingLock || levelDone) return;
        timeLeft--; updateHUD();
        if (timeLeft <= 0) playerDie();
      }, 1000);
      loopId = requestAnimationFrame(gameLoop);
    }
  }
  requestAnimationFrame(animBar);
}

function startGame() {
  if (loopId) cancelAnimationFrame(loopId);
  clearInterval(timerInt);
  score=0; lives=3; level=0; dyingLock=false; playerDying=false; pts=20;
  initLevel();
  showOv(null);
  running=true; lastPhys=0; animFrame=0;
  timerInt=setInterval(() => {
    if (!running||playerDying||dyingLock||levelDone) return;
    timeLeft--; updateHUD();
    if (timeLeft<=0) playerDie();
  }, 1000);
  loopId=requestAnimationFrame(gameLoop);
}

// ── Screens ───────────────────────────────────────────
function showOv(id) {
  ['ov-title','ov-gameover','ov-lb'].forEach((s) => {
    let el =document.getElementById(s);
    if (!el) return;
    el.style.display = s===id ? 'flex' : 'none';
  });
}

// ── Leaderboard ───────────────────────────────────────
const LB_KEY ='bd_lb_v1';
function lbLoad() { try { return JSON.parse(localStorage.getItem(LB_KEY))||[]; } catch(e) { return []; } }
function lbSave(a) { localStorage.setItem(LB_KEY, JSON.stringify(a)); }
function lbAdd(name, pts) {
  let a =lbLoad();
  a.push({name:name.toUpperCase().slice(0,3).padEnd(3,'.'), score:pts});
  a.sort((x, y) => { return y.score-x.score; });
  const top =a.slice(0,10); lbSave(top);
  return top.findIndex((e) => { return e.score===pts; });
}
function lbRender(hi) {
  if (hi===undefined) hi=-1;
  let a =lbLoad();
  let el =document.getElementById('lb-list');
  if (!el) return;
  if (!a.length) { el.innerHTML='<div style="font-size:8px;color:#666;text-align:center;padding:10px;">BRAK WYNIKÓW</div>'; return; }
  el.innerHTML=a.map((e, i) => {
    const col =i===hi?'#00ffff':i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'#666';
    return '<div class="lbr" style="color:'+col+'">'
      +'<span>'+(i+1)+'.</span>'
      +'<span style="flex:1;text-align:center;">'+e.name+'</span>'
      +'<span>'+e.score+'</span></div>';
  }).join('');
}
function showGameOver(pts) {
  document.getElementById('go-score').textContent=`WYNIK: ${pts}`;
  let a =lbLoad();
  let isTop =a.length<10||pts>(a.length?a[a.length-1].score:0);
  document.getElementById('go-namewrap').style.display=isTop?'flex':'none';
  let rank =a.filter((e) => { return e.score>pts; }).length+1;
  document.getElementById('go-rank').textContent=isTop?`MIEJSCE #${rank} REKORD!`:`MIEJSCE #${Math.min(rank,99)}`;
  document.getElementById('go-name').value='';
  showOv('ov-gameover');
}

// ── Controls ──────────────────────────────────────────
function setupBtn(id, dr, dc) {
  let el =document.getElementById(id);
  function startM(e) { e.preventDefault(); el.classList.add('on'); move(dr,dc); holdInt=setInterval(() => { move(dr,dc); }, moveDelay); }
  function stopM(e)  { e.preventDefault(); el.classList.remove('on'); clearInterval(holdInt); }
  el.addEventListener('touchstart', startM, {passive:false});
  el.addEventListener('touchend',   stopM,  {passive:false});
  el.addEventListener('touchcancel',stopM,  {passive:false});
  el.addEventListener('mousedown',  startM);
  el.addEventListener('mouseup',    stopM);
  el.addEventListener('mouseleave', stopM);
}

// ── Boot ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {

  // ── SPLASH SCREEN ────────────────────────────────────
  function runSplash(onDone) {
    const splash = document.getElementById('splash');
    const sc     = document.getElementById('splash-canvas');
    const sctx   = sc.getContext('2d');
    sc.width = window.innerWidth;
    sc.height = window.innerHeight;

    const PCOLS = ['#8b3a0a','#c46820','#e8943a','#00ccff','#0088cc','#f5a623','#ffffff'];
    const particles = Array.from({length:40}, () => ({
      x: Math.random()*sc.width, y: Math.random()*sc.height,
      size: 4+Math.random()*8, speed: 0.4+Math.random()*1.4,
      col: PCOLS[Math.floor(Math.random()*PCOLS.length)],
      type: Math.random()<0.5?'b':'d', rot: Math.random()*Math.PI*2,
    }));

    let animId;
    function animParticles() {
      sctx.fillStyle='rgba(0,0,0,0.15)';
      sctx.fillRect(0,0,sc.width,sc.height);
      for (const p of particles) {
        p.y+=p.speed; p.rot+=0.02;
        if (p.y>sc.height+20) { p.y=-20; p.x=Math.random()*sc.width; }
        if (p.type==='b') {
          sctx.fillStyle=p.col;
          sctx.beginPath(); sctx.arc(p.x,p.y,p.size,0,Math.PI*2); sctx.fill();
          sctx.fillStyle='rgba(255,255,255,0.2)';
          sctx.beginPath(); sctx.arc(p.x-p.size*0.3,p.y-p.size*0.3,p.size*0.3,0,Math.PI*2); sctx.fill();
        } else {
          sctx.save(); sctx.translate(p.x,p.y); sctx.rotate(p.rot);
          sctx.fillStyle=p.col;
          sctx.beginPath();
          sctx.moveTo(0,-p.size); sctx.lineTo(p.size*0.6,0);
          sctx.lineTo(0,p.size); sctx.lineTo(-p.size*0.6,0);
          sctx.closePath(); sctx.fill(); sctx.restore();
        }
      }
      animId=requestAnimationFrame(animParticles);
    }
    animParticles();

    // Sequence
    setTimeout(()=>document.getElementById('splash-title').classList.add('show'), 300);
    setTimeout(()=>document.getElementById('splash-sub').classList.add('show'), 700);
    setTimeout(()=>document.getElementById('splash-year').classList.add('show'), 1000);
    setTimeout(()=>document.getElementById('splash-bar-wrap').classList.add('show'), 1100);

    // Fill bar over 2s
    const bar = document.getElementById('splash-bar');
    const barStart = performance.now() + 1100;
    const barDur = 2200;
    function fillBar(ts) {
      const pct = Math.max(0, Math.min(100, (ts-barStart)/barDur*100));
      bar.style.width = pct+'%';
      if (pct<100) requestAnimationFrame(fillBar);
      else document.getElementById('splash-press').classList.add('show');
    }
    requestAnimationFrame(fillBar);

    let dismissed = false;
    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      // Instantly fill bar then fade out
      bar.style.transition = 'width 0.2s';
      bar.style.width = '100%';
      cancelAnimationFrame(animId);
      setTimeout(() => {
        splash.style.transition = 'opacity 0.4s';
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display='none'; onDone(); }, 400);
      }, 200);
    }
    splash.addEventListener('click', dismiss);
    splash.addEventListener('touchstart', (e) => { e.preventDefault(); dismiss(); }, {passive:false});
    setTimeout(dismiss, 10000);
  }

  // ── BOOT GAME ────────────────────────────────────────
  function boot() {
    let wrap =document.getElementById('canvas-wrap');
    if (!wrap||wrap.clientHeight<10) { requestAnimationFrame(boot); return; }
    resize();
    window.addEventListener('resize', resize);
    initLevel(); render();
    // Wire buttons
    setupBtn('db-up',   -1, 0);
    setupBtn('db-down',  1, 0);
    setupBtn('db-left',  0,-1);
    setupBtn('db-right', 0, 1);
    document.getElementById('btn-start').addEventListener('click', startGame);
    document.getElementById('btn-start').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); }, {passive:false});
    document.getElementById('btn-scores').addEventListener('click', () => { lbRender(); showOv('ov-lb'); });
    document.getElementById('btn-scores').addEventListener('touchend', (e) => { e.preventDefault(); lbRender(); showOv('ov-lb'); }, {passive:false});
    document.getElementById('btn-lbback').addEventListener('click', () => { showOv('ov-title'); });
    document.getElementById('btn-lbback').addEventListener('touchend', (e) => { e.preventDefault(); showOv('ov-title'); }, {passive:false});
    document.getElementById('btn-gomenu').addEventListener('click', () => { showOv('ov-title'); });
    document.getElementById('btn-gomenu').addEventListener('touchend', (e) => { e.preventDefault(); showOv('ov-title'); }, {passive:false});
    document.getElementById('btn-gosave').addEventListener('click', () => {
      let name =document.getElementById('go-name').value.trim()||'AAA';
      let idx =lbAdd(name, pendingScore); lbRender(idx); showOv('ov-lb');
    });
    document.getElementById('btn-gosave').addEventListener('touchend', (e) => {
      e.preventDefault();
      let name =document.getElementById('go-name').value.trim()||'AAA';
      let idx =lbAdd(name, pendingScore); lbRender(idx); showOv('ov-lb');
    }, {passive:false});
    document.getElementById('go-name').addEventListener('input', (e) => {
      e.target.value=e.target.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
    });
    document.getElementById('go-name').addEventListener('keydown', (e) => {
      if (e.key==='Enter') document.getElementById('btn-gosave').click();
    });
    // Touch steer on canvas
    let tsx = null, tsy = null;
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      tsx = e.touches[0].clientX;
      tsy = e.touches[0].clientY;
    }, {passive:false});
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const dx = e.touches[0].clientX - tsx;
      const dy = e.touches[0].clientY - tsy;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx < -20) move(0, -1);
        else if (dx > 20) move(0, 1);
      } else {
        if (dy < -20) move(-1, 0);
        else if (dy > 20) move(1, 0);
      }
    }, {passive:false});
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, {passive:false});
    // Keyboard
    const held ={};
    const keyIntervals = {};  // one interval per key
    document.addEventListener('keydown', (e) => {
      if (held[e.key]) return; held[e.key]=true;
      const map ={'ArrowUp':[-1,0],'ArrowDown':[1,0],'ArrowLeft':[0,-1],'ArrowRight':[0,1],'w':[-1,0],'s':[1,0],'a':[0,-1],'d':[0,1]};
      if (map[e.key]) {
        e.preventDefault();
        const d = map[e.key];
        move(d[0], d[1]);
        clearInterval(keyIntervals[e.key]);
        keyIntervals[e.key] = setInterval(() => { move(d[0], d[1]); }, moveDelay);
      }
    });
    document.addEventListener('keyup', (e) => {
      held[e.key] = false;
      clearInterval(keyIntervals[e.key]);
      delete keyIntervals[e.key];
    });
    // Safety: clear all intervals on window blur
    window.addEventListener('blur', () => {
      for (const k in keyIntervals) { clearInterval(keyIntervals[k]); delete keyIntervals[k]; }
      for (const k in held) held[k] = false;
    });
  }
  // Run splash first, then boot game
  runSplash(() => requestAnimationFrame(boot));
});
</script>
