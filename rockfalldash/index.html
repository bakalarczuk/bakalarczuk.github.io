* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:#000;
  display:flex; flex-direction:column; align-items:center;
  overflow:hidden; touch-action:none; user-select:none;
  font-family:'Press Start 2P', monospace;
}
#hud {
  width:100%; max-width:420px; background:#111118;
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 8px; border-bottom:2px solid #f5a623; flex-shrink:0;
}
.hs { display:flex; flex-direction:column; align-items:center; gap:2px; }
.hl { font-size:5px; color:#888; letter-spacing:1px; }
.hv { font-size:10px; color:#f5a623; letter-spacing:1px; }
.hv.cyan { color:#00ffff; }
.hv.red  { color:#ff4444; }
#canvas-wrap {
  width:100%; max-width:420px; flex:1; overflow:hidden;
  display:flex; align-items:center; justify-content:center; min-height:0;
}
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
#dpad {
  width:100%; max-width:420px; background:#0a0a0a;
  display:grid; grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr; gap:5px; padding:7px;
  padding-bottom:env(safe-area-inset-bottom, 7px);
  flex-shrink:0;
}
.db {
  background:#1a1a28; border:2px solid #2a2a3a; border-radius:8px;
  color:#f5a623; font-size:22px; min-height:52px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.db.on { background:#f5a623; color:#000; border-color:#f5a623; }
/* overlay screens */
.ov {
  position:absolute; inset:0; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; z-index:20;
  padding:24px;
}
.ov.show { display:flex; }
.ov::before {
  content:''; position:absolute; inset:10px;
  border:3px solid #f5a623;
  box-shadow:inset 0 0 0 3px #000, inset 0 0 0 6px #333;
  pointer-events:none;
}
.ov > * { position:relative; z-index:1; }
.ov h1 { font-size:15px; color:#f5a623; letter-spacing:3px; text-align:center; line-height:2.2; text-shadow:3px 3px 0 #7a3a00; }
.ov p  { font-size:7px; color:#888; text-align:center; line-height:2.6; letter-spacing:1px; }
.ov .cyan { font-size:9px; color:#00ffff; letter-spacing:2px; }
.ov .sc2  { font-size:8px; color:#f5a623; letter-spacing:1px; }
.btn8 {
  background:#f5a623; color:#000; border:none; cursor:pointer; letter-spacing:2px;
  font-family:'Press Start 2P',monospace; font-size:9px; padding:10px 18px;
  border-top:3px solid #ffcc66; border-left:3px solid #ffcc66;
  border-bottom:3px solid #7a3a00; border-right:3px solid #7a3a00;
}
.btn8:active { border-top:3px solid #7a3a00; border-left:3px solid #7a3a00; border-bottom:3px solid #ffcc66; border-right:3px solid #ffcc66; transform:translate(1px,1px); }
.btn8.sec { background:#1a1a1a; color:#f5a623; border-top:3px solid #333; border-left:3px solid #333; border-bottom:3px solid #000; border-right:3px solid #000; }
.btn8.grn { background:#00cc44; color:#000; border-top:3px solid #88ff88; border-left:3px solid #88ff88; border-bottom:3px solid #006622; border-right:3px solid #006622; }
#go-name {

}
#lb-list {

}
.lbr {

  border-bottom:1px solid #1a1a1a; font-size:8px; letter-spacing:1px;
}
/* splash screen */
#splash {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; overflow:hidden;
}
#splash-canvas {
  position:absolute; inset:0; width:100%; height:100%;
}
#splash-content {
  position:relative; z-index:1;
  display:flex; flex-direction:column;
  align-items:center; gap:16px;
}
#splash-title {
  font-size:28px; color:#f5a623;
  letter-spacing:6px; text-align:center; line-height:1.8;
  text-shadow: 4px 4px 0 #7a3a00, 0 0 30px #f5a62388;
  opacity:0; transform:translateY(-20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
#splash-title.show { opacity:1; transform:translateY(0); }
#splash-sub {
  font-size:7px; color:#f5a623; letter-spacing:3px;
  opacity:0; transition: opacity 0.6s ease 0.4s;
}
#splash-sub.show { opacity:0.7; }
#splash-year {
  font-size:6px; color:#444; letter-spacing:2px;
  opacity:0; transition: opacity 0.6s ease 0.8s;
}
#splash-year.show { opacity:1; }
#splash-bar-wrap {
  width:160px; height:4px; background:#1a1a1a;
  border:1px solid #333; margin-top:20px;
  opacity:0; transition: opacity 0.3s ease 0.6s;
}
#splash-bar-wrap.show { opacity:1; }
#splash-bar { height:100%; width:0%; background:#f5a623; }
#splash-press {
  font-size:7px; color:#666; letter-spacing:2px;
  opacity:0; animation: splashBlink 1s infinite;
  margin-top:8px;
}
#splash-press.show { opacity:1; }
@keyframes splashBlink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* loading screen */
#ov-loading {
  position:absolute; inset:0; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px; z-index:30;
}
#ov-loading.show { display:flex; }
#loading-title { font-size:12px; color:#f5a623; letter-spacing:3px; text-shadow:3px 3px 0 #7a3a00; }
#loading-level { font-size:22px; color:#00ffff; letter-spacing:4px; text-shadow:3px 3px 0 #004466; }
#loading-bar-wrap { width:200px; height:12px; border:2px solid #333; background:#000; }
#loading-bar { height:100%; width:0%; background:#f5a623; transition:width 0.05s; }
#loading-info { font-size:9px; color:#f5a623; letter-spacing:2px; text-align:center; line-height:2.2; }
#loading-stars { font-size:18px; color:#ffd700; letter-spacing:4px; text-align:center; text-shadow:0 0 8px #ffd700; }

</style>
